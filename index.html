<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiikuLive Distance Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="distanceWidget" class="widget">
    <span class="icon">📍</span>
    <span class="label" id="label">Kuljettu tänään:</span>
    <span class="value" id="distance">0.0 km</span>
    <button id="resetBtn" class="reset hidden" type="button">Nollaa</button>
  </div>

  <div id="help" class="help hidden">
    <strong>MiikuLive Distance Widget</strong><br>
    Normaali: <code>/Distance-Widget/</code><br>
    Reset-nappi: <code>?controls=true</code><br>
    Demo: <code>?demo=true</code>
  </div>

  <script src="script.js"></script>
</body>
</html>
